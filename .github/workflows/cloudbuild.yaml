steps:
  # Step 1: Build the Docker image for the React/Vite app
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'africa-south1-docker.pkg.dev/$PROJECT_ID/marketmint-frontend-repo/marketmint-ui:$COMMIT_SHA',
      '.'
    ]

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'africa-south1-docker.pkg.dev/$PROJECT_ID/marketmint-frontend-repo/marketmint-ui:$COMMIT_SHA'
    ]

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'marketmint-ui',
      '--image', 'africa-south1-docker.pkg.dev/$PROJECT_ID/marketmint-frontend-repo/marketmint-ui:$COMMIT_SHA',
      '--region', 'africa-south1',
      '--platform', 'managed',
      '--port', '80',
      '--allow-unauthenticated'
    ]

# Tracking the South African frontend image
images:
  - 'africa-south1-docker.pkg.dev/$PROJECT_ID/marketmint-frontend-repo/marketmint-ui:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: 'africa-south1'